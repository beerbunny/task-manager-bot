services:
  bot:
    image: ghcr.io/beerbunny/task-manager-bot:latest
    container_name: task_manager_bot
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    image: ghcr.io/beerbunny/task-manager-bot:latest
    container_name: task_manager_migrate
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16
    container_name: task_manager_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_manager -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: